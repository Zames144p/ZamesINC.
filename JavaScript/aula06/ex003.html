<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Somando Valores</title>
    <style>
      body{
        font-family: Arial, Helvetica, sans-serif;
      }
      input{
        font: normal 18px Arial;
        width: 100px;
      }
      div#res{
        margin-top: 20px;
      }
    </style>
</head>
<body>
    <h1>Somando Valores</h1>
    <input type="number" id="txtn1" name="txtn1"> +
    <input type="number" id="txtn2" name="txtn2">
    <button onclick="somar()">Somar</button>
    <div id="res">resultado</div>
    <script> 
      function somar(){
        var n1 = window.document.getElementById('txtn1')
        var n2 = window.document.getElementById('txtn2')
        var res = window.document.getElementById('res')
        var n1 = Number(n1.value)
        var n2 = Number(n2.value)
        var s = n1 + n2
        res.innerHTML = `A soma entre ${n1} e ${n2} é igual a <strong>${s}</strong>`
      }
    </script>
</body>
</html>

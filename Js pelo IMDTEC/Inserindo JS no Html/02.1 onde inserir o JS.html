<html>
    <head>
        <meta charset="UTF-8">
        <title>Programação Estruturada - Aula 01</title>
        <script>
            function functionNoHead() {
                document.getElementById("meu_texto_1").innerHTML = "Alterei o conteudo.";
            }
        </script>
    </head>
    <body>
        <noscript>Seu navegador nâo suporta JavaScript ou ele está desabilitado</noscript>
        <h1>Onde colocar o codigo JavaScript?</h1>
        <h2>01 - no Cabeçalho</h2>
        <p id="meu_texto_1">Conteudo inicial</p>
        <button type="button" onclick="functionNoHead()">click aqui</button>
    </body>
</html>

<html>

    <body>
        <noscript>Seu navegador não suporta JavaScript ou está desativado.</noscript>
        <h1>Instruções JavaScript</h1>
        <h2>Sequência de Instruções</h2>
        <p id="meu_texto_1"></p>

            var x, y, z; 
            x = 10;
            y = 20;

            document.getElementById("meu_texto_1").innerHTML = "O resultado da soma de x + y é: " + z;
        </script>
